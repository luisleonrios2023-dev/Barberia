<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>MiBarbería | Contacto</title>

    <meta name="description"
        content="Contacta con MiBarbería en Madrid. Reserva tu cita, consulta horarios y recibe atención personalizada cerca del metro O'Donnell.">

    <meta name="keywords"
        content="barbería, cortes de cabello, arreglo de barba, barber shop, peluquería masculina, barbería moderna, contacto">

    <meta name="author" content="Luis León">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">

    <meta property="og:title" content="MiBarbería | Contacto">

    <meta property="og:description"
        content="Descubre cortes modernos, afeitado clásico y atención personalizada en MiBarbería.">

    <meta property="og:image" content="https://www.mibarberia.com/img/banner.webp">

    <meta property="og:url" content="https://www.mibarberia.com/contacto">

    <meta property="og:site_name" content="MiBarbería">
    <meta property="og:locale" content="es_ES">

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">

    <meta name="twitter:title" content="MiBarbería | Contacto">

    <meta name="twitter:description"
        content="Cortes modernos, barba y estilo profesional en MiBarbería. Reserva fácil y rápido.">

    <meta name="twitter:image" content="https://www.mibarberia.com/img/banner.webp">
    
    <!-- Enlace de estilos -->
    <link href="css/contacto.css" rel="stylesheet">
</head>

<body>
    <main>
        <section class="contacto-hero">
            <h1>Contacto</h1>
            <p>Estamos encantados de atenderte. Escríbenos y responderemos lo antes posible.</p>
        </section>

        <section class="contacto-formulario">
            <form id="form-contacto">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="tu@email.com">

                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" required
                    placeholder="Escribe tu mensaje aquí..."></textarea>

                <button type="submit">Enviar</button>
            </form>

            <div class="contacto-info">
                <h2>Nuestra ubicación</h2>
                <p>Dirección: Calle Doctor Esquerdo 120</p>
                <p>Teléfono: +34 912 345 678</p>
                <p>Email: contacto@mibarberia.com</p>
                <p>Ciudad: Madrid, España</p>
                <h2>Redes sociales</h2>
                <p>
                    <img src="/img/icono-instagram.webp" alt="Instagram" class="icono-redes">
                    <img src="/img/icono-facebook.webp" alt="Facebook" class="icono-redes">
                    <img src="/img/icono-x.webp" alt="YouTube" class="icono-redes">
                </p>
            </div>
        </section>
    </main>
</body>

</html>
